<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E27"/>
      <stop offset="0.55" stop-color="#141038"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- subtle dotted grid -->
  <g fill="#FFFFFF" opacity="0.05">
    <!-- generated dots -->
    <g>
      <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="320" cy="80" r="2"/>
      <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
      <circle cx="80" cy="240" r="2"/><circle cx="160" cy="240" r="2"/>
      <circle cx="80" cy="540" r="2"/><circle cx="160" cy="540" r="2"/><circle cx="240" cy="540" r="2"/>
    </g>
  </g>

  <!-- right-side multi-agent network motif -->
  <g opacity="0.9">
    <g stroke="url(#accent)" stroke-width="2" opacity="0.5">
      <line x1="1040" y1="180" x2="1130" y2="120"/>
      <line x1="1040" y1="180" x2="1150" y2="240"/>
      <line x1="1040" y1="180" x2="1060" y2="300"/>
      <line x1="1040" y1="180" x2="960" y2="250"/>
      <line x1="1130" y1="120" x2="1150" y2="240"/>
      <line x1="1060" y1="300" x2="1150" y2="240"/>
      <line x1="960" y1="250" x2="1060" y2="300"/>
      <line x1="1040" y1="180" x2="980" y2="120"/>
    </g>
    <!-- central node (team lead) -->
    <circle cx="1040" cy="180" r="30" fill="url(#accent)"/>
    <circle cx="1040" cy="180" r="46" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
    <!-- agent nodes -->
    <circle cx="1130" cy="120" r="16" fill="#3B82F6"/>
    <circle cx="1150" cy="240" r="16" fill="#8B5CF6"/>
    <circle cx="1060" cy="300" r="16" fill="#22C55E"/>
    <circle cx="960" cy="250" r="16" fill="#F59E0B"/>
    <circle cx="980" cy="120" r="16" fill="#14B8A6"/>
  </g>

  <!-- logo mark: hexagon with robot face -->
  <g transform="translate(96, 96)">
    <path d="M40 2 L74 21 L74 59 L40 78 L6 59 L6 21 Z" fill="url(#accent)"/>
    <rect x="22" y="28" width="36" height="26" rx="6" fill="#0A0E27"/>
    <circle cx="32" cy="41" r="4.5" fill="#3B82F6"/>
    <circle cx="48" cy="41" r="4.5" fill="#8B5CF6"/>
    <line x1="40" y1="20" x2="40" y2="28" stroke="#0A0E27" stroke-width="3"/>
    <circle cx="40" cy="18" r="3.5" fill="#0A0E27"/>
  </g>

  <!-- title -->
  <text x="190" y="150" fill="#FFFFFF" font-size="74" font-weight="bold" letter-spacing="-1">AI Team Skills</text>

  <!-- version pill -->
  <g transform="translate(190, 178)">
    <rect x="0" y="0" width="118" height="34" rx="17" fill="url(#accent)"/>
    <text x="59" y="23" fill="#FFFFFF" font-size="19" font-weight="bold" text-anchor="middle">v2.3.0</text>
  </g>

  <!-- tagline -->
  <text x="96" y="300" fill="#CBD5E1" font-size="34" font-weight="600">A complete, autonomous AI engineering team for your codebase.</text>
  <text x="96" y="346" fill="#94A3B8" font-size="26">Project-aware · self-adapting · continuous across sessions — across every major AI IDE.</text>

  <!-- stat chips -->
  <g transform="translate(96, 400)" font-weight="bold">
    <g>
      <rect x="0" y="0" width="190" height="64" rx="14" fill="#FFFFFF" opacity="0.07"/>
      <text x="20" y="29" fill="#3B82F6" font-size="30">17</text>
      <text x="56" y="29" fill="#E2E8F0" font-size="19">Specialized</text>
      <text x="20" y="51" fill="#94A3B8" font-size="17" font-weight="normal">agents</text>
    </g>
    <g transform="translate(210,0)">
      <rect x="0" y="0" width="190" height="64" rx="14" fill="#FFFFFF" opacity="0.07"/>
      <text x="20" y="29" fill="#8B5CF6" font-size="30">4</text>
      <text x="46" y="29" fill="#E2E8F0" font-size="19">Core</text>
      <text x="20" y="51" fill="#94A3B8" font-size="17" font-weight="normal">protocols</text>
    </g>
    <g transform="translate(420,0)">
      <rect x="0" y="0" width="190" height="64" rx="14" fill="#FFFFFF" opacity="0.07"/>
      <text x="20" y="29" fill="#F59E0B" font-size="30">8</text>
      <text x="46" y="29" fill="#E2E8F0" font-size="19">Platforms</text>
      <text x="20" y="51" fill="#94A3B8" font-size="17" font-weight="normal">auto-loaded</text>
    </g>
    <g transform="translate(630,0)">
      <rect x="0" y="0" width="230" height="64" rx="14" fill="#FFFFFF" opacity="0.07"/>
      <text x="20" y="29" fill="#22C55E" font-size="22">Autonomous</text>
      <text x="20" y="51" fill="#94A3B8" font-size="17" font-weight="normal">activates itself</text>
    </g>
  </g>

  <!-- footer -->
  <text x="96" y="556" fill="#64748B" font-size="24" font-weight="bold">github.com/byrohat/ai-team-skills</text>
  <text x="1184" y="556" fill="#475569" font-size="22" text-anchor="end">MIT © ByRohat</text>
</svg>
